<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a Student Registration Form Using HTML</title>
</head>
<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="Full Name">Full Name: </label>
            <input type="text" name="fname" id="Full Name" placeholder="Enter your name" required>
            <br><br>

            <label for="Student ID">Student ID: </label>
            <input type="text" name="id" id="Student ID" placeholder="Enter your ID" required>
            <br><br>

            <label for="Email">Email Address:</label>
            <input type="text" name="Email" id="Email" placeholder="Enter your Email" required>
            <br><br>

            <label for="Phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" placeholder="Enter your phone number" required>
            <br><br>

            <label for="DOB">Date of Birth:</label>
            <input type="date" name="Dob" id="DOB" placeholder="Enter your Date of Birth" required>
            <br><br>

            <label> Gender:</label>
            <input type="radio" name="gender" id="male" value="male" required>
            <label for="male">Male</label>
            <input type="radio" name="female" id="female" value="female" required>
            <label for="female">Female</label>
            <input type="radio" name="other" id="other" value="other" required>
            <label for="other">Other</label>

        </fieldset>
        <br><br>

        <fieldset>
            <legend>Academic Information</legend>
            <label for="department">Department:</label>
            <select name="department" id="department" required>
                <option value=""selected disabled>Select Department</option>
               
                <option value="cse">CSE</option>
                        <option value="cse">CSE</option>
                            <option value="eee">EEE</option>
                                <option value="bba">BBA</option>
                                    <option value="english">English</option>
                                        <option value="civil">Civil Engineering</option>
            </select>
            <br><br>

            <label for="semester">Semester</label>
            <select name="semester" id="semester" required>
                <option value=""selected disabled>Choose Semester</option>
                <option value="1st">1st Semester</option>
                <option value="2nd">2nd Semester</option>
                <option value="3rd">3rd Semester</option>
                  <option value="4th">4th Semester</option>
                    <option value="5th">5th Semester</option>
                      <option value="6th">6th Semester</option>
                        <option value="7th">7th Semester</option>
                          <option value="8th">8th Semester</option>
            </select>
        </fieldset>
        <br> <br>

        <fieldset>
            <legend>Skills</legend>
            <label for="skills">Select Programming Language Known:</label>
            <select name="Programming Language" id="Programming Language" required>
                <option value=""selected disabled>Choose</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="Java">Java</option>
                <option value="Python">Python</option>
                <option value="JavaScript">JavaScript</option>
            </select>
        </fieldset>
        <br><br>

        <fieldset>
            <legend>Additional Information</legend>
           

<label for="address">Address:</label><br>
<textarea id="address" name="address" rows="4" cols="40" maxlength="200" placeholder="Write your comments here(max 200 char)"></textarea>

<br><br>

<label for="photo">Upload Student Photo:</label><br>
<input type="file" id="photo" name="photo" accept="image/*">

<br><br>

<label for="comments">Comments/Suggestions:</label><br>
<textarea id="comments" name="comments" rows="4" cols="40" maxlength="200" placeholder="Write your comments here(max 200 char)"></textarea>

    </fieldset>
    <br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">
    
    </form>
</body>
</html>
